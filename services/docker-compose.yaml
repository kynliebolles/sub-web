version: "3"
services:
  subweb:
    build: ../.
    container_name: subweb
    restart: always
    ports:
      - "${SUBWEB_PORT}:80"

  # 自建转换后端（最敏感的一环：它会抓取你的订阅、接触节点凭据）
  subconverter:
    image: "tindy2013/subconverter:latest"
    container_name: subconverter
    restart: always
    ports:
      - "${SUBCONVERTER_PORT}:25500"

  myurls:
    image: "careywong/myurls:latest"
    container_name: myurls
    restart: always
    ports:
      - "${MYURLS_PORT}:8002"
    volumes:
      - ./data/myurls/logs:/app/logs       
    depends_on:
      - myurls-redis
    entrypoint: ["/app/myurls", "-domain", "${MYURLS_DOMAIN}", "-conn", myurls-redis:6379, "-ttl", "${MYURLS_TTL}"]
  
  myurls-redis:
    image: "redis:5"
    container_name: myurls-redis
    restart: always
    volumes:
      - ./data/redis:/data    
    expose:
      - "6379"
