server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- 安全响应头 ----
    add_header X-Frame-Options        "DENY"        always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # Content-Security-Policy
    # - 本应用需要连接用户自定义/任意转换后端，故 connect-src 放开 http/https scheme；
    #   若你已固定自建后端，可把 connect-src 收紧为具体域名以获得更强防护。
    # - Element UI 会注入内联样式，故 style-src 需要 'unsafe-inline'。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http: https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # ---- 单页应用路由回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
